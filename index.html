<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnFlow Modern Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #111827;
            --light: #0F172A;
            --dark: #1E293B;
            --success: #10B981;
            --danger: #EF4444;
            --surface: rgba(30, 41, 59, 0.92);
            --text: #F8FAFC;
            --muted: #94A3B8;
            --border: rgba(255,255,255,0.08);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg,#0f172a,#111827,#1e293b);
            color: var(--text);
            min-height: 100vh;
        }
        #app-container { transition: filter 0.3s; }

        #top-bar {
            background: rgba(17,24,39,0.85);
            backdrop-filter: blur(14px);
            color: white;
            padding: 0 18px;
            display: flex;
            align-items: center;
            height: 65px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        #menu-toggle {
            background: rgba(255,255,255,0.08);
            border: none;
            color: white;
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
        }

        #page-title {
            font-size: 1.2rem;
            margin-left: 15px;
            font-weight: 700;
        }

        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 270px;
            height: 100vh;
            background: rgba(15,23,42,0.98);
            backdrop-filter: blur(18px);
            color: white;
            z-index: 2000;
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        #sidebar.open { transform: translateX(0); }

        #sidebar-header {
            padding: 24px;
            text-align: center;
        }

        #sidebar-header h2 {
            color: white;
            font-size: 1.5rem;
        }

        #sidebar-header .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
        }

        .nav-menu {
            list-style: none;
            padding: 10px;
            margin: 0;
        }

        .nav-menu li {
            padding: 14px 18px;
            cursor: pointer;
            border-radius: 16px;
            transition: all 0.25s ease;
            margin-bottom: 8px;
            border: 1px solid transparent;
            font-weight: 500;
        }

        .nav-menu li:hover,
        .nav-menu li.active {
            background: linear-gradient(135deg,#6C63FF,#8B5CF6);
            border-color: rgba(255,255,255,0.1);
            transform: translateX(3px);
        }

        .nav-menu li i {
            margin-right: 12px;
            width: 20px;
            text-align: center;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.65);
            z-index: 1999;
            display: none;
            backdrop-filter: blur(4px);
        }

        #overlay.show { display: block; }

        #main-content {
            padding: 22px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--surface);
            border-radius: 24px;
            padding: 22px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
            margin-bottom: 22px;
            backdrop-filter: blur(12px);
        }

        h1, h3, h4 {
            color: white;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead { display: none; }

        tr {
            display: block;
            margin-bottom: 16px;
            border-radius: 18px;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
        }

        td {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            color: var(--text);
        }

        td:last-child { border-bottom: none; }

        td::before {
            content: attr(data-label);
            font-weight: bold;
            margin-right: 10px;
            color: var(--muted);
        }

        .action-buttons {
            text-align: right;
            width: 100%;
        }

        .action-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 14px;
            color: white;
            cursor: pointer;
            margin: 3px;
            font-weight: 600;
            transition: 0.25s;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 7px;
            font-weight: 500;
            color: var(--muted);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255,255,255,0.04);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #6C63FF;
        }

        .btn-success { background: linear-gradient(135deg,#10B981,#059669); }
        .btn-danger { background: linear-gradient(135deg,#EF4444,#DC2626); }
        .btn-primary { background: linear-gradient(135deg,#6C63FF,#8B5CF6); }

        .dynamic-item-list {
            list-style: none;
            padding-left: 0;
        }

        .dynamic-item-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px;
        }

        .withdraw-method-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }

        small {
            color: var(--muted);
        }

        @media (min-width: 768px) {
            #app-container {
                display: flex;
            }

            #top-bar {
                display: none;
            }

            #sidebar {
                position: static;
                transform: translateX(0);
                width: 270px;
                height: 100vh;
            }

            #sidebar-header .close-btn {
                display: none;
            }

            #main-content {
                flex-grow: 1;
                padding: 32px;
            }

            thead {
                display: table-header-group;
            }

            tr {
                display: table-row;
                margin-bottom: 0;
                border: none;
                padding: 0;
                background: transparent;
            }

            td {
                display: table-cell;
                padding: 16px 12px;
                border-bottom: 1px solid rgba(255,255,255,0.06);
            }

            td::before {
                display: none;
            }

            .action-buttons {
                text-align: left;
            }
        }
    </style>
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <div>
                <div id="sidebar-header"><h2><i class="fas fa-shield-alt"></i> Admin Panel</h2><span class="close-btn">&times;</span></div>
                <ul class="nav-menu">
                    <li data-page="dashboard" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
                    <li data-page="users"><i class="fas fa-users"></i> Users</li>
                    <li data-page="withdrawals"><i class="fas fa-wallet"></i> Pending Withdrawals</li>
                    <li data-page="history"><i class="fas fa-history"></i> Withdrawal History</li>
                    <li data-page="tasks"><i class="fas fa-tasks"></i> Tasks & Links</li>
                    <li data-page="settings"><i class="fas fa-cog"></i> App Settings</li>
                    <li data-page="broadcast"><i class="fas fa-bullhorn"></i> Broadcast</li>
                </ul>
            </div>
            <!-- Logout button is removed as there is no login -->
        </aside>
        
        <div id="overlay"></div>

        <div id="content-wrapper" style="width: 100%;">
            <header id="top-bar">
                <button id="menu-toggle"><i class="fas fa-bars"></i></button>
                <h1 id="page-title">Dashboard</h1>
            </header>
            <main id="main-content"></main>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const firebaseConfig = {
            apiKey: "AIzaSyDX4H6hl8gGx59KrfwuODOTJDkwChcOO-w",
  authDomain: "clone-afefa.firebaseapp.com",
  projectId: "clone-afefa",
  storageBucket: "clone-afefa.firebasestorage.app",
  messagingSenderId: "118515097456",
  appId: "1:118515097456:web:8e40eb88450be30500f9b5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        const mainContent = document.getElementById('main-content');
        const pageTitle = document.getElementById('page-title');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');

        const escapeHtml = (value = '') => String(value).replace(/[&<>"']/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[char]));
        const formatError = (error) => {
            if (!error) return 'Unknown error';
            if (typeof error === 'string') return error;
            return error.stack || error.message || JSON.stringify(error);
        };
        const showErrorDialog = (title, error) => {
            const detail = formatError(error);
            console.error(title, error);
            let dialog = document.getElementById('error-dialog');
            if (!dialog) {
                dialog = document.createElement('div');
                dialog.id = 'error-dialog';
                dialog.style.cssText = 'position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);z-index:9999;padding:18px;';
                dialog.innerHTML = '<div style="max-width:680px;width:100%;background:#111827;border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:22px;color:white;box-shadow:0 20px 60px rgba(0,0,0,0.45);"><h3 id="error-dialog-title"></h3><pre id="error-dialog-detail" style="white-space:pre-wrap;max-height:50vh;overflow:auto;background:rgba(255,255,255,0.06);padding:14px;border-radius:12px;color:#F8FAFC;"></pre><button class="action-btn btn-primary" id="error-dialog-close">Close</button></div>';
                document.body.appendChild(dialog);
                document.getElementById('error-dialog-close').addEventListener('click', () => { dialog.style.display = 'none'; });
            }
            document.getElementById('error-dialog-title').textContent = title;
            document.getElementById('error-dialog-detail').textContent = detail;
            dialog.style.display = 'flex';
        };
        const money = (value) => Number(value || 0).toFixed(2);
        const safeUrl = (value) => {
            if (!value) return '';
            try {
                const url = new URL(String(value), window.location.href);
                return ['http:', 'https:'].includes(url.protocol) ? url.href : '';
            } catch (_) { return ''; }
        };
        const requireAdminUnlock = async () => {
            if (sessionStorage.getItem('earnflowAdminUnlocked') === 'true') return true;
            const snap = await db.ref('config/adminPassword').once('value');
            const savedPassword = snap.val();
            if (!savedPassword) {
                return confirm('No admin password is set yet. Continue to settings and create one now?');
            }
            const entered = prompt('Enter admin password');
            const ok = entered === savedPassword;
            if (ok) sessionStorage.setItem('earnflowAdminUnlocked', 'true');
            if (!ok) mainContent.innerHTML = '<div class="card"><h3>Access denied</h3><p>Admin password is incorrect.</p></div>';
            return ok;
        };

        window.addEventListener('error', (event) => showErrorDialog('Runtime Error', event.error || event.message));
        window.addEventListener('unhandledrejection', (event) => showErrorDialog('Async Error', event.reason));
        
        const renderDashboard = async () => {
            const usersSnap = await db.ref('users').once('value');
            const withdrawalsSnap = await db.ref('withdrawals/pending').once('value');
            mainContent.innerHTML = `<div id="dashboard" class="page active">
                <div class="card"><h3>Total Users</h3><h1>${usersSnap.numChildren()}</h1></div>
                <div class="card"><h3>Pending Withdrawals</h3><h1>${withdrawalsSnap.numChildren()}</h1></div>
            </div>`;
        };
        
        const renderUsers = async () => {
            mainContent.innerHTML = '<div class="card"><h3>Loading Users...</h3></div>';
            const snap = await db.ref('users').orderByChild('firstName').once('value'); let tableContent = '';
            snap.forEach(child => {
                const user = child.val();
                const userId = escapeHtml(user.id || child.key);
                const userName = `${user.firstName || ''} ${user.lastName || ''}`.trim() || 'Unnamed User';
                tableContent += `<tr>
                    <td data-label="User">${escapeHtml(userName)}<br><small>${userId}</small></td>
                    <td data-label="Balance">${money(user.balance)} TK</td>
                     <td data-label="Referrals">${user.referrals || 0}</td>
                    <td data-label="Actions"><div class="action-buttons"><button class="action-btn btn-primary" data-action="edit-balance" data-user-id="${userId}" data-user-name="${escapeHtml(userName)}">Edit Balance</button></div></td>
                </tr>`;
            });
            mainContent.innerHTML = `<div id="users" class="page active"><h3>All Users</h3><div class="card"><table><thead><tr><th>User</th><th>Balance</th><th>Referrals</th><th>Actions</th></tr></thead><tbody>${tableContent}</tbody></table></div></div>`;
        };
        
        const renderWithdrawals = async () => {
            mainContent.innerHTML = '<div class="card"><h3>Loading Requests...</h3></div>';
            const snap = await db.ref('withdrawals/pending').orderByChild('timestamp').once('value'); let tableContent = '';
            let requests = [];
            snap.forEach(child => { requests.push(child.val()); });
            requests.reverse(); // Show newest first
            requests.forEach(req => {
                const reqId = escapeHtml(req.id || '');
                tableContent += `<tr>
                    <td data-label="User">${escapeHtml(req.userName || 'Unknown')}<br><small>${new Date(req.timestamp || Date.now()).toLocaleString()}</small></td>
                    <td data-label="Amount"><b>${money(req.amount)} TK</b><br><small>${escapeHtml(req.method || '')} | ${escapeHtml(req.account || '')}</small></td>
                    <td data-label="Actions"><div class="action-buttons"><button class="action-btn btn-success" data-action="withdrawal" data-req-id="${reqId}" data-withdraw-action="approve">Approve</button><button class="action-btn btn-danger" data-action="withdrawal" data-req-id="${reqId}" data-withdraw-action="reject">Reject</button></div></td>
                </tr>`;
            });
            mainContent.innerHTML = `<div id="withdrawals" class="page active"><h3>Pending Withdrawals</h3><div class="card"><table><thead><tr><th>User & Date</th><th>Amount & Details</th><th>Actions</th></tr></thead><tbody>${tableContent || '<tr><td colspan=3>No pending requests</td></tr>'}</tbody></table></div></div>`;
        };
        
        const renderWithdrawalHistory = async () => {
            mainContent.innerHTML = '<div class="card"><h3>Loading History...</h3></div>';
            const completedSnap = await db.ref('withdrawals/completed').orderByChild('timestamp').limitToLast(100).once('value');
            const rejectedSnap = await db.ref('withdrawals/rejected').orderByChild('timestamp').limitToLast(100).once('value');
            let completedRows = '', rejectedRows = '';
            
            let completed = [];
            completedSnap.forEach(child => { completed.push(child.val()); });
            completed.reverse();
            completed.forEach(req => { completedRows += `<tr><td data-label="User">${escapeHtml(req.userName || 'Unknown')}</td><td data-label="Amount">${money(req.amount)}</td><td data-label="Date">${new Date(req.timestamp || Date.now()).toLocaleDateString()}</td><td data-label="Status">Completed</td></tr>`; });

            let rejected = [];
            rejectedSnap.forEach(child => { rejected.push(child.val()); });
            rejected.reverse();
            rejected.forEach(req => { rejectedRows += `<tr><td data-label="User">${escapeHtml(req.userName || 'Unknown')}</td><td data-label="Amount">${money(req.amount)}</td><td data-label="Date">${new Date(req.timestamp || Date.now()).toLocaleDateString()}</td><td data-label="Status">Rejected</td></tr>`; });
            
            mainContent.innerHTML = `
                <div id="history" class="page active"><h3>Withdrawal History</h3>
                    <div class="card"><h4>Completed Requests</h4><table><thead><tr><th>User</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>${completedRows || '<tr><td colspan="4">No completed requests.</td></tr>'}</tbody></table></div>
                    <div class="card"><h4>Rejected Requests</h4><table><thead><tr><th>User</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead><tbody>${rejectedRows || '<tr><td colspan="4">No rejected requests.</td></tr>'}</tbody></table></div>
                </div>`;
        };

        const renderTasks = async () => {
             mainContent.innerHTML = `<div id="tasks" class="page active"><h3>Manage Tasks & Links</h3>
                <div class="card" id="tasks-list"><h4>Loading tasks...</h4></div>
                <div class="card"><h4>Add New Task</h4>
                    <div class="form-group"><input id="task-name" placeholder="Task Name (e.g., Join Telegram)"></div>
                    <div class="form-group"><input id="task-url" placeholder="URL"></div>
                    <div class="form-group"><input id="task-reward" type="number" placeholder="Reward Amount"></div>
                    <div class="form-group"><input id="task-icon" placeholder="Image Icon URL"></div>
                    <button class="action-btn btn-primary" data-action="add-task">Add Task</button>
                </div>
                <div class="card" id="links-list"><h4>Loading links...</h4></div>
                <div class="card"><h4>Add New Link/Button</h4>
                    <div class="form-group"><input id="link-name" placeholder="Button Name (e.g., Official Channel)"></div>
                    <div class="form-group"><input id="link-url" placeholder="URL"></div>
                    <div class="form-group"><input id="link-icon" placeholder="Image Icon URL"></div>
                    <button class="action-btn btn-primary" data-action="add-link">Add Link</button>
                </div></div>`;
            loadDynamicContent('tasks'); loadDynamicContent('links');
        };

        const renderSettings = async () => {
            const snap = await db.ref('config').once('value'); const config = snap.val() || {};
            mainContent.innerHTML = `<div id="settings" class="page active"><h3>App Settings</h3>
                <div class="card">
                    <div class="form-group"><label>Admin Password</label><input type="password" id="adminPassword" value="${escapeHtml(config.adminPassword || '')}" autocomplete="new-password"></div>
                    <div class="form-group"><label>Bot Username (without @)</label><input type="text" id="botUsername" value="${escapeHtml(config.botUsername || '')}"></div>
                    <hr><h4>API & Ad Settings</h4>
                    <div class="form-group"><label>Telegram Bot Token</label><input type="password" id="botToken" value="${escapeHtml(config.botToken || '')}" autocomplete="new-password"></div>
                    <div class="form-group"><label>Ad Network Zone ID</label><input type="number" id="adZoneId" value="${escapeHtml(config.adZoneId || '')}"></div>
                    <div class="form-group"><label>Welcome Message</label><textarea id="welcomeMessage">${escapeHtml(config.welcomeMessage || '')}</textarea></div><hr>
                    <h4>Earning Settings</h4>
                    <div class="form-group"><label>Value per Ad</label><input type="number" step="any" id="adValue" value="${Number(config.adValue || 0)}"></div>
                    <div class="form-group"><label>Referral Bonus</label><input type="number" step="any" id="referralBonus" value="${Number(config.referralBonus || 0)}"></div>
                    <div class="form-group"><label>Daily Ad Limit</label><input type="number" id="dailyAdLimit" value="${Number(config.dailyAdLimit || 0)}"></div>
                    <div class="form-group"><label>Ads Before Break</label><input type="number" id="adsPerBreak" value="${Number(config.adsPerBreak || 0)}"></div>
                    <div class="form-group"><label>Break Duration (Minutes)</label><input type="number" id="breakDuration" value="${Number(config.breakDuration || 0)}"></div>
                    <div class="form-group"><label>Minimum Move to Main Balance</label><input type="number" step="any" id="minimumMoveToBalance" value="${Number(config.minimumMoveToBalance || 50)}"></div><hr>
                    <h4>Withdrawal Settings</h4>
                    <!-- New field for minimum referrals -->
                    <div class="form-group"><label>Minimum Referrals for Withdraw</label><input type="number" id="minimumWithdrawReferrals" value="${Number(config.minimumWithdrawReferrals || 0)}"></div>
                    <div id="withdraw-methods-container"></div>
                    <button class="action-btn btn-primary" data-action="add-withdraw-method">+ Add Method</button>
                    <hr style="margin: 20px 0;">
                    <button class="action-btn btn-success" style="width:100%; padding:15px;" data-action="save-settings">Save All Settings</button>
                </div></div>`;
            renderWithdrawMethods(config.withdrawMethods);
        };
        
        const renderBroadcast = () => {
             mainContent.innerHTML = `<div id="broadcast" class="page active"><h3>Broadcast Message</h3>
                <div class="card"><p>This message will be sent to all users. <strong>Important:</strong> This requires a server-side function (like Firebase Cloud Functions) to work correctly.</p>
                    <div class="form-group"><textarea id="broadcast-message" rows="5" placeholder="Your message here..."></textarea></div>
                    <button class="action-btn btn-danger" data-action="send-broadcast">Queue Broadcast</button>
                </div></div>`;
        };

        const loadDynamicContent = async (type) => {
            const container = document.getElementById(`${type}-list`);
            const snap = await db.ref(`config/${type}`).once('value');
            let items = [];
            snap.forEach(child => { items.push({ key: child.key, ...child.val() }); });
            items.reverse(); // Show newest first
            
            let content = `<h4>Current ${type.charAt(0).toUpperCase() + type.slice(1)}</h4>`;
            if (items.length > 0) {
                content += '<ul class="dynamic-item-list">';
                items.forEach(item => {
                    content += `<li>${escapeHtml(item.name || 'Unnamed')} <button class="action-btn btn-danger" style="padding: 5px 8px;" data-action="delete-dynamic" data-type="${escapeHtml(type)}" data-key="${escapeHtml(item.key)}"><i class="fas fa-trash"></i></button></li>`;
                });
                content += '</ul>';
            } else { content += `<p>No ${type} found.</p>`; }
            container.innerHTML = content;
        };
        
        const renderWithdrawMethods = (methods) => {
            const container = document.getElementById('withdraw-methods-container'); container.innerHTML = '';
            if (methods) {
                methods.forEach((method, index) => {
                    container.innerHTML += `<div class="withdraw-method-group" data-index="${index}"><input value="${escapeHtml(method.name || '')}" placeholder="Method Name"><input type="number" step="any" value="${Number(method.min || '')}" placeholder="Min Amount"><button class="action-btn btn-danger" data-action="remove-method">X</button></div>`;
                });
            }
        };

        window.adminActions = {
            editUserBalance: async (userId, userName) => {
                const amount = prompt(`Enter amount to ADD or SUBTRACT for ${userName}.\nUse negative value to subtract (e.g., -50).`);
                const parsedAmount = parseFloat(amount);
                if (amount && Number.isFinite(parsedAmount)) { try { await db.ref(`users/${userId}/balance`).set(firebase.database.ServerValue.increment(parsedAmount)); alert('Balance updated!'); renderUsers(); } catch (e) { showErrorDialog('Balance update failed', e); alert('Error updating balance.'); } }
            },
            handleWithdrawal: async (reqId, action) => {
                try {
                    const reqRef = db.ref(`withdrawals/pending/${reqId}`); const snap = await reqRef.once('value'); const request = snap.val();
                    if (!request) { alert('Request not found.'); return; }
                    if (!confirm(`Are you sure you want to ${action} this withdrawal?`)) return;
                    if (action === 'reject') { 
                        await db.ref(`users/${request.userId}/balance`).set(firebase.database.ServerValue.increment(request.amount));
                        // Optionally add a reason for rejection in a notification system
                    }
                    const status = action === 'approve' ? 'completed' : 'rejected';
                    await db.ref(`withdrawals/${status}/${reqId}`).set({ ...request, status, processedAt: firebase.database.ServerValue.TIMESTAMP });
                    await reqRef.remove(); alert(`Request has been ${status}.`); renderWithdrawals();
                } catch (error) {
                    showErrorDialog('Withdrawal action failed', error);
                }
            },
            addTask: async () => {
                try {
                    const data = { name: document.getElementById('task-name').value.trim(), url: safeUrl(document.getElementById('task-url').value), reward: parseFloat(document.getElementById('task-reward').value), icon: safeUrl(document.getElementById('task-icon').value) };
                    if (!data.name || !data.url || !Number.isFinite(data.reward) || data.reward <= 0 || !data.icon) { alert('All fields are required and reward must be greater than zero.'); return; }
                    await db.ref('config/tasks').push(data); alert('Task added!'); renderTasks();
                } catch (error) {
                    showErrorDialog('Add task failed', error);
                }
            },
            addLink: async () => {
                try {
                    const data = { name: document.getElementById('link-name').value.trim(), url: safeUrl(document.getElementById('link-url').value), icon: safeUrl(document.getElementById('link-icon').value) };
                    if (!data.name || !data.url || !data.icon) { alert('Name, URL and Icon URL are required.'); return; }
                    await db.ref('config/links').push(data); alert('Link added!'); renderTasks();
                } catch (error) {
                    showErrorDialog('Add link failed', error);
                }
            },
            deleteDynamicItem: async (type, key) => {
                try {
                    if (confirm(`Are you sure you want to delete this item?`)) { await db.ref(`config/${type}/${key}`).remove(); alert('Item deleted.'); renderTasks(); }
                } catch (error) {
                    showErrorDialog('Delete item failed', error);
                }
            },
            addWithdrawMethodField: () => {
                 document.getElementById('withdraw-methods-container').innerHTML += `<div class="withdraw-method-group"><input placeholder="Method Name"><input type="number" step="any" placeholder="Min Amount"><button class="action-btn btn-danger" data-action="remove-method">X</button></div>`;
            },
            saveSettings: async () => {
                try {
                    const withdrawMethods = [];
                    document.querySelectorAll('.withdraw-method-group').forEach(group => {
                        const name = group.children[0].value.trim(); const min = parseFloat(group.children[1].value);
                        if (name && Number.isFinite(min) && min >= 0) { withdrawMethods.push({ name, min }); }
                    });
                    const numberValue = (id, fallback = 0) => {
                        const value = parseFloat(document.getElementById(id).value);
                        return Number.isFinite(value) ? value : fallback;
                    };
                    const settings = {
                        adminPassword: document.getElementById('adminPassword').value.trim(),
                        botUsername: document.getElementById('botUsername').value.trim().replace(/^@/, ''),
                        botToken: document.getElementById('botToken').value.trim(),
                        adZoneId: document.getElementById('adZoneId').value.trim(),
                        welcomeMessage: document.getElementById('welcomeMessage').value.trim(),
                        adValue: numberValue('adValue'),
                        referralBonus: numberValue('referralBonus'),
                        dailyAdLimit: parseInt(numberValue('dailyAdLimit'), 10),
                        adsPerBreak: parseInt(numberValue('adsPerBreak'), 10),
                        breakDuration: parseInt(numberValue('breakDuration'), 10),
                        minimumMoveToBalance: numberValue('minimumMoveToBalance', 50),
                        // Saving the new minimum referrals setting
                        minimumWithdrawReferrals: parseInt(numberValue('minimumWithdrawReferrals'), 10) || 0,
                        withdrawMethods: withdrawMethods
                    };
                    if (!settings.adminPassword) { alert('Set an admin password before saving.'); return; }
                    await db.ref('config').update(settings); alert('Settings saved successfully!');
                } catch (error) {
                    showErrorDialog('Save settings failed', error);
                }
            },
            sendBroadcast: async () => {
                try {
                    const message = document.getElementById('broadcast-message').value;
                    if (!message || !confirm('Are you sure you want to queue this broadcast?')) { return; }
                    await db.ref('broadcastQueue').push({ message, timestamp: Date.now(), status: 'pending' });
                    alert('Broadcast has been added to the queue. The server will now process it.');
                } catch (error) {
                    showErrorDialog('Broadcast queue failed', error);
                }
            }
        };

        const setupNavigation = () => {
            const navLinks = document.querySelectorAll('.nav-menu li');
            const pageMap = { dashboard: renderDashboard, users: renderUsers, withdrawals: renderWithdrawals, history: renderWithdrawalHistory, tasks: renderTasks, settings: renderSettings, broadcast: renderBroadcast };
            navLinks.forEach(link => {
                link.addEventListener('click', (e) => {
                    const pageKey = e.currentTarget.dataset.page;
                    if (pageKey) {
                        navLinks.forEach(l => l.classList.remove('active'));
                        e.currentTarget.classList.add('active');
                        pageTitle.textContent = e.currentTarget.textContent.trim();
                        Promise.resolve(pageMap[pageKey]()).catch(error => showErrorDialog(`${pageTitle.textContent} failed to load`, error));
                        sidebar.classList.remove('open'); overlay.classList.remove('show');
                    }
                });
            });
            // No logout link functionality needed
        };

        const setupActionHandlers = () => {
            mainContent.addEventListener('click', (e) => {
                const button = e.target.closest('[data-action]');
                if (!button) return;
                const action = button.dataset.action;
                if (action === 'edit-balance') window.adminActions.editUserBalance(button.dataset.userId, button.dataset.userName);
                if (action === 'withdrawal') window.adminActions.handleWithdrawal(button.dataset.reqId, button.dataset.withdrawAction);
                if (action === 'add-task') window.adminActions.addTask();
                if (action === 'add-link') window.adminActions.addLink();
                if (action === 'delete-dynamic') window.adminActions.deleteDynamicItem(button.dataset.type, button.dataset.key);
                if (action === 'add-withdraw-method') window.adminActions.addWithdrawMethodField();
                if (action === 'remove-method') button.closest('.withdraw-method-group').remove();
                if (action === 'save-settings') window.adminActions.saveSettings();
                if (action === 'send-broadcast') window.adminActions.sendBroadcast();
            });
        };
        
        const setupMobileMenu = () => {
            const menuToggle = document.getElementById('menu-toggle');
            const closeBtn = document.querySelector('#sidebar .close-btn');
            menuToggle.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
            closeBtn.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
            overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
        };

        const initAdminPanel = async () => {
            try {
                const unlocked = await requireAdminUnlock();
                if (!unlocked) return;
                setupNavigation(); 
                setupActionHandlers();
                setupMobileMenu(); 
                await renderDashboard();
            } catch (error) {
                showErrorDialog('Admin panel failed to start', error);
            }
        };
        
        // Initialize the panel directly
        initAdminPanel();
    });
    </script>
</body>
</html>
